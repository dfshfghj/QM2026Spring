name: CI

on:
  pull_request:
    branches:
      - dev
      - main
  push:
    branches:
      - dev
      - main

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  branch-policy:
    name: branch-policy
    runs-on: ubuntu-latest

    steps:
      - name: Enforce PR target policy
        shell: bash
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "base_ref=${{ github.base_ref }}"
          echo "head_ref=${{ github.head_ref }}"

          if [ "${{ github.event_name }}" != "pull_request" ]; then
            exit 0
          fi

          BASE="${{ github.base_ref }}"
          HEAD="${{ github.head_ref }}"

          if [ "$BASE" = "main" ] && [ "$HEAD" != "dev" ]; then
            echo "Only PRs from 'dev' to 'main' are allowed."
            exit 1
          fi

          if [ "$BASE" = "dev" ] && { [ "$HEAD" = "dev" ] || [ "$HEAD" = "main" ]; }; then
            echo "PRs to 'dev' must come from feature branches, not '$HEAD'."
            exit 1
          fi

          echo "Branch policy check passed."

  build:
    name: build
    runs-on: ubuntu-latest
    needs: branch-policy

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: src/main.tex
          args: -halt-on-error -file-line-error

      - name: Verify PDF exists
        shell: bash
        run: |
          test -f main.pdf || (echo "main.pdf not found" && exit 1)

      - name: Upload PDF artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pdf-preview-${{ github.event.pull_request.number || github.run_number }}
          path: main.pdf
          if-no-files-found: error
          retention-days: 7

      - name: Comment on PR with preview info
        if: github.event_name == 'pull_request' && success()
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: pdf-preview
          message: |
            PDF preview 已生成。

            查看方式：
            1. 打开本次 CI workflow run
            2. 在页面底部 **Artifacts** 下载 `pdf-preview-${{ github.event.pull_request.number || github.run_number }}`
            3. 解压后查看 `main.pdf`

            当前信息：
            - Base: `${{ github.base_ref }}`
            - Head: `${{ github.head_ref }}`

      - name: Comment on PR when build failed
        if: github.event_name == 'pull_request' && failure()
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: pdf-preview
          message: |
            这次 CI 没有生成可用的 PDF preview。

            请检查：
            - LaTeX 编译错误
            - 缺失文件
            - 非法的 PR 分支流转策略